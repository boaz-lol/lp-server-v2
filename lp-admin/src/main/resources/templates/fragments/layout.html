<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Sidebar Fragment -->
<nav th:fragment="sidebar" class="sidebar col-md-2 d-md-block p-0">
    <div class="p-3">
        <h5 class="text-white mb-0">LP Admin</h5>
        <small class="text-muted">Riot 전적 수집 관리</small>
    </div>
    <hr class="text-secondary my-0">
    <ul class="nav flex-column">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#strings.equals(currentPage, 'dashboard')} ? 'active'" th:href="@{/}">
                Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#strings.equals(currentPage, 'jobs')} ? 'active'" th:href="@{/batch/jobs}">
                배치 실행 이력
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#strings.equals(currentPage, 'failed')} ? 'active'" th:href="@{/batch/jobs/failed}">
                실패 건 목록
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#strings.equals(currentPage, 'statistics')} ? 'active'" th:href="@{/batch/statistics}">
                통계
            </a>
        </li>
        <hr class="text-secondary">
        <li class="nav-item">
            <a class="nav-link" th:classappend="${#strings.equals(currentPage, 'riot-api-key')} ? 'active'" th:href="@{/settings/riot-api-key}">
                Riot API Key 설정
            </a>
        </li>
    </ul>
</nav>

<!-- Header Fragment -->
<header th:fragment="header" class="d-flex justify-content-between align-items-center pb-3 mb-4 border-bottom">
    <h4 class="mb-0" th:text="${pageTitle}">Page Title</h4>
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
    </form>
</header>

</html>
