<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Admin - Batch Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <th:block th:replace="~{fragments/layout :: sidebar}" th:with="currentPage='jobs'"/>

            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <th:block th:replace="~{fragments/layout :: header}" th:with="pageTitle='배치 실행 이력'"/>

                <div th:if="${dbError}" class="alert alert-warning" th:text="${dbError}"></div>
                <th:block th:unless="${dbError}">
                <div class="card">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Job Name</th>
                                    <th>Status</th>
                                    <th>Exit Code</th>
                                    <th>Start Time</th>
                                    <th>End Time</th>
                                    <th>Detail</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job : ${jobs}">
                                    <td th:text="${job.id}"></td>
                                    <td th:text="${job.jobName}"></td>
                                    <td>
                                        <span th:text="${job.status}"
                                              th:classappend="${job.status == 'COMPLETED'} ? 'table-status-completed' : (${job.status == 'FAILED'} ? 'table-status-failed' : 'table-status-started')">
                                        </span>
                                    </td>
                                    <td th:text="${job.exitCode}"></td>
                                    <td th:text="${job.startTime != null} ? ${#temporals.format(job.startTime, 'yyyy-MM-dd HH:mm:ss')} : '-'"></td>
                                    <td th:text="${job.endTime != null} ? ${#temporals.format(job.endTime, 'yyyy-MM-dd HH:mm:ss')} : '-'"></td>
                                    <td><a th:href="@{/batch/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-outline-secondary">Detail</a></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(jobs)}">
                                    <td colspan="7" class="text-center text-muted py-4">No job executions found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Pagination -->
                <nav th:if="${totalCount > pageSize}" class="mt-3">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/batch/jobs(page=${currentPage - 1}, size=${pageSize})}">Previous</a>
                        </li>
                        <li class="page-item active">
                            <span class="page-link" th:text="${currentPage + 1}">1</span>
                        </li>
                        <li class="page-item" th:classappend="${(currentPage + 1) * pageSize >= totalCount} ? 'disabled'">
                            <a class="page-link" th:href="@{/batch/jobs(page=${currentPage + 1}, size=${pageSize})}">Next</a>
                        </li>
                    </ul>
                </nav>
                </th:block>
            </main>
        </div>
    </div>
</body>
</html>
