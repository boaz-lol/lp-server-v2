<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Admin - Failed Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <th:block th:replace="~{fragments/layout :: sidebar}" th:with="currentPage='failed'"/>

            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <th:block th:replace="~{fragments/layout :: header}" th:with="pageTitle='실패 건 목록'"/>

                <div th:if="${dbError}" class="alert alert-warning" th:text="${dbError}"></div>
                <th:block th:unless="${dbError}">
                <div class="card">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Job Name</th>
                                    <th>Status</th>
                                    <th>Exit Code</th>
                                    <th>Exit Message</th>
                                    <th>Start Time</th>
                                    <th>Detail</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job : ${jobs}">
                                    <td th:text="${job.id}"></td>
                                    <td th:text="${job.jobName}"></td>
                                    <td class="table-status-failed" th:text="${job.status}"></td>
                                    <td th:text="${job.exitCode}"></td>
                                    <td>
                                        <span th:if="${job.exitMessage != null}"
                                              th:text="${#strings.abbreviate(job.exitMessage, 80)}"
                                              th:title="${job.exitMessage}">
                                        </span>
                                    </td>
                                    <td th:text="${job.startTime != null} ? ${#temporals.format(job.startTime, 'yyyy-MM-dd HH:mm:ss')} : '-'"></td>
                                    <td><a th:href="@{/batch/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-outline-secondary">Detail</a></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(jobs)}">
                                    <td colspan="7" class="text-center text-muted py-4">No failed jobs found</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                </th:block>
            </main>
        </div>
    </div>
</body>
</html>
