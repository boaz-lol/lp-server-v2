<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP Admin - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/admin.css}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <th:block th:replace="~{fragments/layout :: sidebar}" th:with="currentPage='dashboard'"/>

            <main class="col-md-10 ms-sm-auto px-4 py-4">
                <th:block th:replace="~{fragments/layout :: header}" th:with="pageTitle='Dashboard'"/>

                <div th:if="${dbError}" class="alert alert-warning" th:text="${dbError}"></div>

                <th:block th:unless="${dbError}">
                    <!-- Summary Cards -->
                    <div class="row mb-4" th:if="${summary}">
                        <div class="col-md-3">
                            <div class="card stat-card bg-primary text-white">
                                <div class="card-body">
                                    <h6 class="card-title">Total Executions</h6>
                                    <h2 th:text="${summary.totalCount}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card stat-card bg-success text-white">
                                <div class="card-body">
                                    <h6 class="card-title">Completed</h6>
                                    <h2 th:text="${summary.completedCount}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card stat-card bg-danger text-white">
                                <div class="card-body">
                                    <h6 class="card-title">Failed</h6>
                                    <h2 th:text="${summary.failedCount}">0</h2>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card stat-card bg-info text-white">
                                <div class="card-body">
                                    <h6 class="card-title">Running</h6>
                                    <h2 th:text="${summary.runningCount}">0</h2>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Recent Job Executions -->
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">Recent Job Executions</h5>
                            <a th:href="@{/batch/jobs}" class="btn btn-sm btn-outline-primary">View All</a>
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-hover mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>ID</th>
                                        <th>Job Name</th>
                                        <th>Status</th>
                                        <th>Start Time</th>
                                        <th>End Time</th>
                                        <th>Detail</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="job : ${recentJobs}">
                                        <td th:text="${job.id}"></td>
                                        <td th:text="${job.jobName}"></td>
                                        <td>
                                            <span th:text="${job.status}"
                                                  th:classappend="${job.status == 'COMPLETED'} ? 'table-status-completed' : (${job.status == 'FAILED'} ? 'table-status-failed' : 'table-status-started')">
                                            </span>
                                        </td>
                                        <td th:text="${job.startTime != null} ? ${#temporals.format(job.startTime, 'yyyy-MM-dd HH:mm:ss')} : '-'"></td>
                                        <td th:text="${job.endTime != null} ? ${#temporals.format(job.endTime, 'yyyy-MM-dd HH:mm:ss')} : '-'"></td>
                                        <td><a th:href="@{/batch/jobs/{id}(id=${job.id})}" class="btn btn-sm btn-outline-secondary">Detail</a></td>
                                    </tr>
                                    <tr th:if="${#lists.isEmpty(recentJobs)}">
                                        <td colspan="6" class="text-center text-muted py-4">No job executions found</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </th:block>
            </main>
        </div>
    </div>
</body>
</html>
