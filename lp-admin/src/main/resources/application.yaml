server:
  port: 8081

spring:
  application:
    name: lp-admin
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
  thymeleaf:
    cache: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin1234}

batch:
  server:
    url: ${BATCH_SERVER_URL:http://localhost:8082}
    internal-key: ${BATCH_INTERNAL_KEY:batch-internal-secret-key}
