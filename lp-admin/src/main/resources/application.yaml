server:
  port: 8081

spring:
  application:
    name: lp-admin
  profiles:
    active: local
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

admin:
  api-key: ${ADMIN_API_KEY:change-this-before-deploying}
